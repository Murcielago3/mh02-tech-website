<!-- @dsCard group="Instagram Templates" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IG · Statement (ink) — 1080×1350</title>
<link rel="stylesheet" href="../ds.css">
<style>
  body {
    width: 1080px; height: 1350px; overflow: hidden; position: relative;
    background: radial-gradient(ellipse 70% 60% at 50% 115%, rgba(111,224,172,0.16), transparent), var(--green-ink);
    color: var(--ink-text);
  }
  .dots i { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.35); }
  .frame { position: absolute; inset: 0; padding: 96px; display: flex; flex-direction: column; }
  .eyebrow-ig { display: inline-flex; align-items: center; gap: 14px; font-family: var(--font-mono); font-size: 18px; letter-spacing: 0.22em; color: var(--ink-mint); }
  .eyebrow-ig::before { content: ''; width: 44px; height: 2px; background: rgba(111,224,172,0.4); }
  h1 { font-family: var(--font-display); font-size: 116px; line-height: 1.06; letter-spacing: -0.02em; color: #ffffff; margin-top: 190px; font-weight: normal; }
  h1 em { font-family: var(--font-accent); font-style: italic; font-size: 1.06em; color: var(--ink-mint); }
  .sub { margin-top: 54px; font-size: 33px; line-height: 1.6; color: rgba(255,255,255,0.8); max-width: 22em; }
  .cta {
    margin-top: auto; display: inline-flex; align-items: center; gap: 16px; align-self: flex-start;
    padding: 30px 58px; border-radius: 999px; background: #ffffff; color: var(--green-deep);
    font-size: 32px; font-weight: 600; box-shadow: 0 16px 60px rgba(0,0,0,0.4);
  }
  .ghost {
    position: absolute; bottom: -0.24em; right: -0.03em;
    font-family: var(--font-display); font-style: italic; font-size: 380px; line-height: 1;
    color: transparent; -webkit-text-stroke: 2px rgba(242,248,244,0.07); pointer-events: none;
  }
  .handle { position: absolute; bottom: 96px; right: 96px; font-family: var(--font-mono); font-size: 20px; letter-spacing: 0.14em; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
  <span class="dots" aria-hidden="true">
    <i style="top:10%; left:14%; width:4px; height:4px;"></i><i style="top:22%; left:82%; width:3px; height:3px;"></i>
    <i style="top:35%; left:6%; width:3px; height:3px;"></i><i style="top:48%; left:90%; width:4px; height:4px;"></i>
    <i style="top:64%; left:12%; width:3px; height:3px;"></i><i style="top:76%; left:70%; width:4px; height:4px;"></i>
    <i style="top:16%; left:48%; width:3px; height:3px;"></i><i style="top:58%; left:40%; width:3px; height:3px;"></i>
  </span>
  <div class="frame">
    <span class="eyebrow-ig">[ AUTOMATION ]</span>
    <h1>Set it up once.<br><em>It handles the rest.</em></h1>
    <p class="sub">Reminders go out on Sunday. Reports land on the 1st. You don't have to remember any of it.</p>
    <span class="cta">Book a demo →</span>
    <span class="handle">tech.studiomh02.com</span>
  </div>
  <span class="ghost" aria-hidden="true">MH02</span>
</body>
</html>
