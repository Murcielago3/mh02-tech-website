<!-- @dsCard group="Instagram Templates" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IG · Pain/Fix — 1080×1350</title>
<link rel="stylesheet" href="../ds.css">
<style>
  body {
    width: 1080px; height: 1350px; overflow: hidden; position: relative;
    background: var(--bg-2);
    display: flex; align-items: center; justify-content: center;
  }
  .card-ig {
    width: 820px; padding: 90px 80px;
    background: #fff; border: 2px solid var(--border);
    border-radius: 32px; box-shadow: 0 40px 90px -40px rgba(16,35,26,0.25);
    display: flex; flex-direction: column; gap: 40px;
  }
  .x { font-family: var(--font-mono); font-size: 34px; color: var(--pain-red); }
  h1 { font-family: var(--font-display); font-size: 74px; line-height: 1.1; letter-spacing: -0.015em; color: var(--text); font-weight: normal; }
  .desc { font-size: 32px; line-height: 1.65; color: var(--text-secondary); }
  .fix { display: flex; gap: 26px; padding-top: 44px; border-top: 3px dashed var(--border); }
  .fix span { font-family: var(--font-mono); font-size: 34px; color: var(--green-bright); }
  .fix p { font-size: 33px; line-height: 1.6; color: var(--green-deep); font-weight: 500; }
  .brand { position: absolute; bottom: 70px; left: 0; right: 0; text-align: center; font-family: var(--font-mono); font-size: 20px; letter-spacing: 0.2em; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="card-ig">
    <span class="x">✕</span>
    <h1>Half the week is spent nagging people</h1>
    <p class="desc">Every Friday someone's chasing timesheets. Every month-end someone's pinging managers who forgot to approve things.</p>
    <div class="fix">
      <span>→</span>
      <p>Slack handles the reminders now. It knows who's late and tags them directly.</p>
    </div>
  </div>
  <span class="brand">MH02 DASHBOARD · TECH.STUDIOMH02.COM</span>
</body>
</html>
